<!DOCTYPE html>
<html>
<head>
    <title>AI Image Explorer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f0f2f5; padding-top: 50px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #target-img { width: 100%; border-radius: 10px; cursor: help; border: 3px solid transparent; transition: 0.3s; }
        #target-img:hover { border-color: #007bff; transform: scale(1.02); }
        button { margin-top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        #ai-bubble { margin-top: 20px; padding: 15px; font-style: italic; color: #333; min-height: 50px; border-left: 5px solid #007bff; background: #e9f5ff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Co si AI myslí o obrázku?</h1>
        <img id="target-img" src="https://picsum.photos/600/400" alt="Random Image">
        <br>
        <button onclick="nextImage()">Načíst další obrázek</button>
        <div id="ai-bubble">Najjeď myší na obrázek a uvidíš...</div>
    </div>

    <script>
        const img = document.getElementById('target-img');
        const bubble = document.getElementById('ai-bubble');

        // Funkce pro změnu obrázku
        function nextImage() {
            img.src = "https://picsum.photos/600/400?t=" + new Date().getTime();
            bubble.innerText = "Nový obrázek načten. Zkus na něj najet!";
        }

        // Detekce najetí myši
        img.onmouseenter = async () => {
            bubble.innerText = "AI přemýšlí...";
            const res = await fetch('/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action: 'hover' })
            });
            const data = await res.json();
            bubble.innerText = data.odpoved;
        };
    </script>
</body>
</html>
